kind = "web"
previewPath = "/"
title = "ShadowTrace OSINT Platform"
version = "1.0.0"
id = "artifacts/shadowtrace"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19536

[services.development]
run = "pnpm --filter @workspace/shadowtrace run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shadowtrace", "run", "build" ]
publicDir = "artifacts/shadowtrace/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19536"
BASE_PATH = "/"

services:
  - type: web
    name: osint-tool-api
    runtime: node
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build
    preDeployCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @workspace/db run push-force
    startCommand: pnpm --filter @workspace/api-server run start
    healthCheckPath: /api/healthz
    autoDeploy: true
    buildFilter:
      paths:
        - artifacts/api-server/**
        - lib/**
        - package.json
        - pnpm-lock.yaml
        - pnpm-workspace.yaml
        - tsconfig.json
        - tsconfig.base.json
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: osint-tool-db
          property: connectionString

databases:
  - name: osint-tool-db
